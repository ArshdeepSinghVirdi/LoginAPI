# Local deploy: docker compose up --build
# Register: POST http://localhost:3000/api/auth/register
# Login: POST http://localhost:3000/api/auth/login  body: {"username":"demo","password":"password123"}
# Profile: GET http://localhost:3000/api/auth/me  header: Authorization: Bearer <token>
services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-me-in-real-deployments}
      JWT_EXPIRES_IN: 8h
      PORT: 3000
